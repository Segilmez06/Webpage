<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js"></script>
</head>
<body>
    <div class="gameContainer">
        <div class="titleContainer">
            <h1 class="title">
                Tic Tac Toe
            </h1>
        </div>
        
        <div class="gridContainer">
            <div class="gridItem clickable" cell="0"></div>
            <div class="gridItem clickable" cell="1"></div>
            <div class="gridItem clickable" cell="2"></div>
            <div class="gridItem clickable" cell="3"></div>
            <div class="gridItem clickable" cell="4"></div>
            <div class="gridItem clickable" cell="5"></div>
            <div class="gridItem clickable" cell="6"></div>
            <div class="gridItem clickable" cell="7"></div>
            <div class="gridItem clickable" cell="8"></div>
        </div>

        <div class="statusContainer">
            <h2 class="status"></h2>
        </div>

        <div class="resetBtnContainer">
            <button class="resetBtn">
                Restart
            </button>
        </div>
    </div>
</body>
</html>
